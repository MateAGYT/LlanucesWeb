<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Llanuces - Inicio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/e/e0/Escudoquiros.png">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #f9f9f9;
        }
        .content {
            text-align: center;
        }
        img {
            max-width: 250px;
            height: auto;
            display: block;
            margin: 0 auto;
        }
        h1 {
            color: blue;
            font-family: Calibri, sans-serif;
            margin: 20px 0 10px;
            animation: blink 0.5s step-end infinite;
        }
        @keyframes blink {
            50% {
                visibility: hidden;
            }
        }
        p {
            font-family: Calibri, sans-serif;
            margin: 0;
            font-size: 1.1em;
        }
    </style>
</head>
<body>
    <div class="content">
        <img src="assets/img/loader.gif" alt="Cargando...">
        <h1>¡Proximamente!</h1>
        <p>Estamos terminando esta web. ¡Sed pacientes!<br>- <a href="https://mateag.com" target="_blank">MateAG</a></p>
    </div>
    <script>
        const t = ["Llanuces - Inicio", "Próximamente", "MateAG"];
        let i = 0;
        setInterval(() => {
            i = (i + 1) % t.length;
            document.title = t[i];
        }, 1000);
    </script>
</body>
</html>
